substitutions:
  _PROJECT_ID: qwiklabs-asl-03-7c1aaee9a503
  _REGION: us-central1
  _BUCKET: qwiklabs-asl-03-7c1aaee9a503
  _PIPELINE_NAME: project-completion-dnn
  _PIPELINE_ROOT: gs://qwiklabs-asl-03-7c1aaee9a503/project_completion/kfp_pipeline
  _TRAIN_DATA_PATH: gs://qwiklabs-asl-03-7c1aaee9a503/jindong_lin/data/project_completion/train/project-train-*
  _EVAL_DATA_PATH: gs://qwiklabs-asl-03-7c1aaee9a503/jindong_lin/data/project_completion/valid/project-valid-*
  _SERVICE_ACCOUNT: cloud-build-vertex-runner@qwiklabs-asl-03-7c1aaee9a503.iam.gserviceaccount.com

steps:
  - name: python:3.10-slim
    id: build-and-compile-pipeline
    entrypoint: bash
    env:
      - PROJECT_ID=${_PROJECT_ID}
      - REGION=${_REGION}
      - BUCKET=${_BUCKET}
      - PIPELINE_NAME=${_PIPELINE_NAME}
      - PIPELINE_ROOT=${_PIPELINE_ROOT}
      - TRAIN_DATA_PATH=${_TRAIN_DATA_PATH}
      - EVAL_DATA_PATH=${_EVAL_DATA_PATH}
      - SERVICE_ACCOUNT=${_SERVICE_ACCOUNT}
      - PYTHONPATH=/workspace
      - MODEL_OUTPUT_DIR=gs://${_BUCKET}/project_completion/kfp_trained_dnn_model_${COMMIT_SHA}
      - PACKAGE_URI=gs://${_BUCKET}/project_completion/packages/project_completion_trainer-${COMMIT_SHA}.tar.gz
    args:
      - -ceu
      - |
        python -m venv /workspace/venv
        . /workspace/venv/bin/activate

        python -m pip install --upgrade pip build
        python -m pip install -r requirements-ci.txt
        python -m pip install -e project_completion

        touch project_completion/__init__.py
        touch project_completion/pipeline_vertex/__init__.py
        export PYTHONPATH="/workspace:$${PYTHONPATH:-}"

        python -m compileall project_completion scripts
        python -m build --sdist project_completion

        python scripts/compile_pipeline.py

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: upload-artifacts-to-gcs
    entrypoint: bash
    env:
      - PROJECT_ID=${_PROJECT_ID}
      - BUCKET=${_BUCKET}
      - PACKAGE_URI=gs://${_BUCKET}/project_completion/packages/project_completion_trainer-${COMMIT_SHA}.tar.gz
    args:
      - -ceu
      - |
        gcloud config set project "$$PROJECT_ID"
        gcloud storage cp project_completion/dist/*.tar.gz "$$PACKAGE_URI"
        gcloud storage cp project_completion_kfp_pipeline.yaml "gs://$$BUCKET/pipelines/project_completion_kfp_pipeline-${COMMIT_SHA}.yaml"

  - name: python:3.10-slim
    id: submit-vertex-pipeline
    entrypoint: bash
    env:
      - PROJECT_ID=${_PROJECT_ID}
      - REGION=${_REGION}
      - BUCKET=${_BUCKET}
      - PIPELINE_NAME=${_PIPELINE_NAME}
      - PIPELINE_ROOT=${_PIPELINE_ROOT}
      - TRAIN_DATA_PATH=${_TRAIN_DATA_PATH}
      - EVAL_DATA_PATH=${_EVAL_DATA_PATH}
      - SERVICE_ACCOUNT=${_SERVICE_ACCOUNT}
      - PYTHONPATH=/workspace
      - MODEL_OUTPUT_DIR=gs://${_BUCKET}/project_completion/kfp_trained_dnn_model_${COMMIT_SHA}
      - PACKAGE_URI=gs://${_BUCKET}/project_completion/packages/project_completion_trainer-${COMMIT_SHA}.tar.gz
    args:
      - -ceu
      - |
        . /workspace/venv/bin/activate
        export PYTHONPATH="/workspace:$${PYTHONPATH:-}"

        python scripts/submit_pipeline.py

options:
  logging: CLOUD_LOGGING_ONLY
